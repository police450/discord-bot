app = "discord-voice-bot"
primary_region = "lhr"

[build]

[env]
NODE_ENV = "production"

[[services]]
  internal_port = 8080
  protocol = "tcp"
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.http_checks]
    interval = 30000
    timeout = 5000
    grace_period = "10s"
    method = "GET"
    path = "/"

[[vm]]
memory = "1gb"
cpu_kind = "shared"
cpus = 1