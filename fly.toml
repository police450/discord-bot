app = "discord-voice-bot"
primary_region = "lhr"

[build]

[env]
NODE_ENV = "production"

# Use [[services]] NOT [http_service] — http_service routes through Fly's proxy
# which blocks the direct UDP connection Discord voice requires.
[[services]]
  internal_port = 8080
  protocol = "tcp"

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "5s"

[[vm]]
memory = "1gb"
cpu_kind = "shared"
cpus = 1