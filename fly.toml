app = "discord-voice-bot"
primary_region = "lhr"

[build]

[env]
NODE_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = false
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
memory = "1gb"
cpu_kind = "shared"
cpus = 1

# Allocate a dedicated public IPv4 so Discord UDP voice traffic can reach this machine
# Run after first deploy: flyctl ips allocate-v4 -a <app-name>
# Then: flyctl scale count 1 -a <app-name>  (only 1 machine needed)