app = "discord-voice-bot"
primary_region = "lhr"

[build]

[env]
NODE_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = false
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/"

[[vm]]
memory = "1gb"
cpu_kind = "shared"
cpus = 1